<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
    <title>THE PROPHETIC VOICE</title>
</head>
<body>
    <div class="navBar">
        <h1 class="title">THE PROPHETIC VOICE</h1>
        <div class="toggleDiv">
            <div id="doctrineOrInvitation">DOCTRINE</div>
            <input type="checkbox" id="doctrineToggle" class="toggle-checkbox">
                <label for="doctrineToggle" class="toggle-label">
                <div class="toggle-knob"></div>
            </label>
        </div>
        <div id="homeButton" class="material-symbols-outlined">home</div>
        <div id="clearPage">Clear</div>
    </div>

    
    <div id="pageContent">        
        <div id="addPage">
            <form id="addForm">
                <div id="addTitleContainer">
                    <label for="addTitle">Talk Title:</label>
                    <input id="addTitle" type="text" name="title" required>
                </div>
                
                <div id="addInfo">
                    <div id="addDateContainer">
                        <label id="sessionLabel">Conference Session:</label>
                        <label for="addMonthApril">
                            <input id="addMonthApril" type="radio" name="month" value="April" required>
                            April
                        </label>
                        <label for="addMonthOctober">
                            <input id="addMonthOctober" type="radio" name="month" value="October">
                            October
                        </label>
                        <label for="addYear">Year</label>
                        <select id="addYear" name="year">
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                            <option value="2020">2020</option>
                            <option value="2019">2019</option>
                            <option value="2018">2018</option>
                            <option value="2017">2017</option>
                            <option value="2016">2016</option>
                            <option value="2015">2015</option>
                            <option value="2014">2014</option>
                            <option value="2013">2013</option>
                            <option value="2012">2012</option>
                            <option value="2011">2011</option>
                            <option value="2010">2010</option>
                            <option value="2009">2009</option>
                            <option value="2008">2008</option>
                            <option value="2007">2007</option>
                            <option value="2006">2006</option>
                            <option value="2005">2005</option>
                            <option value="2004">2004</option>
                            <option value="2003">2003</option>
                            <option value="2002">2002</option>
                            <option value="2001">2001</option>
                            <option value="2000">2000</option>
                        </select>
                    </div>
                    <div id="addSpeakerContainer">
                        <label for="addSpeaker">Speaker:</label>
                        <input type="text" id="addSpeaker" name="speaker">
                    </div>
                    <div id="addPositionContainer">
                        <label for="addPosition">Position:</label>
                        <select id="addPosition" name="position">
                            <option value="President">President</option>
                            <option value="First Presidency">First Presidency</option>
                            <option value="Apostle">Apostle</option>
                            <option value="General Officer">General Officer</option>
                        </select>
                    </div>
                </div>

                <div id="addContent"> 
                    <div id="leftSideContainer">
                        <details id="godheadContainer">
                            <summary>GodHead</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="God The Father">
                                God The Father
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Jesus Christ">
                                Jesus Christ
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Holy Spirit">
                                The Holy Spirit
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Unity">
                                Unity
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Prayer & Worship">
                                Prayer & Worship
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Heavenly Mother">
                                Heavenly Mother
                            </label><br>
                        </details>

                        <details id="planOfSalvationContainer">
                            <summary>The Plan Of Salvation</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Plan of Salvation">
                                Plan of Salvation
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Premortal Life">
                                Premortal Life
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Creation & The Fall">
                                Creation & The Fall
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Agency & Opposition">
                                Agency & Opposition
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Mortal Life">
                                Mortal Life
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Death & The Spirit World">
                                Death & The Spirit World
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Second Coming &  Millennium">
                                The Second Coming & Millennium
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Resurrection">
                                Resurrection
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Judgment & Degrees of Glory">
                                Judgment & Degrees of Glory
                            </label><br>
                        </details>

                        <details id="atonementContainer">
                            <summary>The Atonement Of Jesus Christ</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Jesus's Earthly Ministry">
                                Jesus's Earthly Ministry
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Christ's Atonement & Salvation">
                                Christ's Atonement
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Gospel">
                                The Gospel
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Faith in Jesus Christ">
                                Faith in Jesus Christ
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Repentance & Salvation">
                                Repentance & Salvation
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Discipleship">
                                Discipleship & Sanctification
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Christlike Attributes & Spiritual Gifts">
                                Christlike Attributes & Spiritual Gifts
                            </label><br>
                        </details>

                        <details id="restorationContainer">
                            <summary>The Restoration</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Dispensation & Apostasy">
                                Dispensation & Apostasy
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Restoration of Christ's Church">
                                The Restoration of Christ's Church
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Gathering of Israel">
                                The Gathering of Israel
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Church Service">
                                Church Service
                            </label><br>
                        </details>

                        <details id="revelationContainer">
                            <summary>Revelation & Scripture</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Prophets & Apostles">
                                Prophets & Apostles
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Personal Revelation">
                                Personal Revelation

                                <input class="topicCheckbox" type="checkbox" value="Gospel Ordinances">
                                Gospel Ordinances
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Gospel Covenants">
                                Gospel Covenants
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Proxy Temple Work">
                                Proxy Temple Work
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="The Covenant Path & Exaltation">
                                The Covenant Path & Exaltation
                            </label><br>
                        </details>

                        <details id="relationshipsContainer">
                            <summary>Relationships & Identity</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Divine Identity & Belonging">
                                Divine Identity & Belonging
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Marriage & Family Relationships">
                                Marriage & Family Relationships
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Fatherhood & Motherhood">
                                Fatherhood & Motherhood
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Friendships">
                                Friendships
                            </label><br>
                        </details>

                        <details id="commandmentsContainer">
                            <summary>Commandments</summary>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Love God">
                                Love God
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Love Your Neighbor">
                                Love Your Neighbor
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Sabbath Day Holy">
                                Sabbath Day Holy
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Tithing & Fasting">
                                Tithing & Fasting
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Word of Wisdom">
                                Word of Wisdom
                            </label><br>
                            <label>
                                <input class="topicCheckbox" type="checkbox" value="Law of Chastity">
                                Law of Chastity

                        </details>
                    </div>
                    <div id="addQuoteContainer">
                        <label for="addQuote">Quote:</label>
                        <textarea id="addQuote" name="quote" rows="8"></textarea>
                    </div>
                    <div id="rightSideContainer">
                        <div id="addLinkContainer">
                            <label for="addLink">Talk Link:</label>
                            <input type="url" id="addLink" name="link">
                            <div class="status-wrapper">
                                <span id="status-message" class="status-text"></span>
                            </div>
                        </div>
                        <div id="addScripturesContainer">
                            <label for="addScripturesBtn">Scripture References:</label>
                            <div id="scriptureInputs"></div>
                            <button type="button" id="addScriptureBtn">
                            Add Scripture
                            </button>
                        </div>
                    </div>
                </div>
                <div id="buttonContainer">
                    <button id="addCancel" type="button" onclick="window.location.href='/index.html';">Cancel</button>
                    <button id="addSubmit" type="addSubmit">Add</button>
                </div>
                </form>
        </div>
        
    </div>

    
</body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</html>
